<!-- Vignesh: Phase 1 (UI) and Phase 2 (fetch connection) -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CineFile — View Bookings</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <!-- Minimal Header -->
  <header>
    <div class="nav-container">
      <a href="index.html" class="logo">Cine<span>File</span></a>
      <nav>
        <a href="index.html">Home</a>
        <a href="addBooking.html">Book Ticket</a>
        <a href="viewBookings.html" class="active">View Bookings</a>
        <a href="searchBooking.html">Search Booking</a>
      </nav>
    </div>
  </header>

  <!-- Content Container -->
  <main class="container">
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem;">
      <h2>All Bookings</h2>
    </div>

    <!-- Custom Styled Table (Static Phase 1 Showcase) -->
    <div class="table-wrapper">
      <table>
        <thead>
          <tr>
            <th>Booking ID</th>
            <th>Customer</th>
            <th>Movie</th>
            <th>Seat</th>
            <th>Show</th>
            <th>Price</th>
          </tr>
        </thead>
        <tbody id="bookingsTableBody">
          <!-- Live bookings will load here -->
        </tbody>
      </table>
    </div>

  </main>

  <!-- Footer -->
  <footer>
    <p>&copy; 2026 CineFile. All Rights Reserved.</p>
  </footer>

  <script>
    fetch("/bookings")
      .then(res => res.json())
      .then(bookings => {
        const tbody = document.getElementById("bookingsTableBody");
        tbody.innerHTML = "";

        if (bookings.length === 0) {
          tbody.innerHTML = '<tr><td colspan="6" style="text-align: center; color: #94a3b8;">No bookings found.</td></tr>';
          return;
        }

        for (let i = 0; i < bookings.length; i++) {
          const booking = bookings[i];
          const row = document.createElement("tr");
          row.innerHTML = `
            <td style="font-weight: bold; color: #38bdf8;">${booking.bookingId}</td>
            <td>${booking.customerName}</td>
            <td>${booking.movieName}</td>
            <td><span class="table-badge">${booking.seatNo}</span></td>
            <td>${booking.showTime}</td>
            <td style="font-weight: bold;">₹${booking.ticketPrice}</td>
          `;
          tbody.appendChild(row);
        }
      })
      .catch(err => {
        console.error("Error loading bookings:", err);
      });
  </script>

</body>
</html>
