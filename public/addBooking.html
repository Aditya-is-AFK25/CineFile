<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CineFile — Book Ticket</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <!-- Minimal Header -->
  <header>
    <div class="nav-container">
      <a href="index.html" class="logo">Cine<span>File</span></a>
      <nav>
        <a href="index.html">Home</a>
        <a href="addBooking.html" class="active">Book Ticket</a>
        <a href="viewBookings.html">View Bookings</a>
        <a href="searchBooking.html">Search Booking</a>
      </nav>
    </div>
  </header>

  <!-- Content Container -->
  <main class="container">
    <h2 style="text-align: center; margin-bottom: 2rem;">Book Reservation Ticket</h2>
    
    <!-- Booking Form -->
    <form id="bookingForm">
      
      <!-- Customer Name -->
      <div class="form-group">
        <label for="customerName">Customer Name</label>
        <input type="text" id="customerName" placeholder="Enter your full name" required />
      </div>

      <!-- Movie Name -->
      <div class="form-group">
        <label for="movieName">Movie Name</label>
        <input type="text" id="movieName" placeholder="e.g. Avengers" required />
      </div>

      <!-- Show Time -->
      <div class="form-group">
        <label for="showTime">Show Time</label>
        <input type="text" id="showTime" placeholder="e.g. 6 PM" required />
      </div>

      <!-- Seat Number -->
      <div class="form-group">
        <label for="seatNo">Seat Number</label>
        <input type="text" id="seatNo" placeholder="e.g. A5, B12" required />
      </div>

      <!-- Ticket Price -->
      <div class="form-group">
        <label for="ticketPrice">Ticket Price (₹)</label>
        <input type="number" id="ticketPrice" placeholder="Enter positive price value" min="0" required />
      </div>

      <!-- Submit Button -->
      <button type="submit">Book Ticket</button>
      
    </form>

    <!-- Empty Message Display Area -->
    <div id="responseMessage" class="alert alert-success" style="display: none; max-width: 500px; margin: 1.5rem auto;"></div>

  </main>

  <!-- Footer -->
  <footer>
    <p>&copy; 2026 CineFile. All Rights Reserved.</p>
  </footer>

  <script>
    // Done by Aditya: Fetch script to process ticket form inputs and submit them to the server API.
    document.getElementById("bookingForm").addEventListener("submit", function(e) {
      e.preventDefault();

      const responseDiv = document.getElementById("responseMessage");
      responseDiv.style.display = "none";
      responseDiv.className = "alert";

      const customerName = document.getElementById("customerName").value.trim();
      const movieName = document.getElementById("movieName").value;
      const showTime = document.getElementById("showTime").value;
      const seatNo = document.getElementById("seatNo").value.trim();
      const ticketPrice = document.getElementById("ticketPrice").value;

      fetch("/addBooking", {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({
          customerName: customerName,
          movieName: movieName,
          showTime: showTime,
          seatNo: seatNo,
          ticketPrice: ticketPrice
        })
      })
      .then(res => {
        return res.json().then(data => {
          responseDiv.style.display = "block";
          if (res.ok) {
            responseDiv.className = "alert alert-success";
            responseDiv.innerText = "Ticket booked successfully! Booking ID: " + data.bookingId;
            document.getElementById("bookingForm").reset();
          } else {
            responseDiv.className = "alert alert-danger";
            responseDiv.innerText = "Error: " + data.message;
          }
        });
      })
      .catch(err => {
        responseDiv.style.display = "block";
        responseDiv.className = "alert alert-danger";
        responseDiv.innerText = "Could not connect to the backend server.";
      });
    });
  </script>

</body>
</html>
