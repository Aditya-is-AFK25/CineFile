<!-- Vignesh: Phase 1 (UI) -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CineFile — Search Booking</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <!-- Minimal Header -->
  <header>
    <div class="nav-container">
      <a href="index.html" class="logo">Cine<span>File</span></a>
      <nav>
        <a href="index.html">Home</a>
        <a href="addBooking.html">Book Ticket</a>
        <a href="viewBookings.html">View Bookings</a>
        <a href="searchBooking.html" class="active">Search Booking</a>
      </nav>
    </div>
  </header>

  <!-- Content Container -->
  <main class="container">
    <div style="max-width: 600px; margin: 0 auto;">
      <h2 style="text-align: center; margin-bottom: 2rem;">Find Reservation Receipt</h2>
      
      <!-- Custom Styled Search Card (Static Phase 1) -->
      <div class="card" style="padding: 2rem; margin-bottom: 2rem;">
        <div class="form-group" style="margin-bottom: 0;">
          <label for="searchId">Booking Reservation ID</label>
          <div class="input-group">
            <input type="text" id="searchId" placeholder="e.g. 101" />
            <button id="searchBtn" type="button">Search</button>
          </div>
          <div class="form-text" style="margin-top: 0.5rem;">Enter the numeric booking ID generated during ticketing.</div>
        </div>
      </div>

      <!-- Search Results Container -->
      <div id="searchResult"></div>

    </div>
  </main>

  <!-- Footer -->
  <footer>
    <p>&copy; 2026 CineFile. All Rights Reserved.</p>
  </footer>

  <script>
    // Done by Vignesh: Event listener on Search button to fetch booking details by ID and display the receipt card.
    document.getElementById("searchBtn").addEventListener("click", function() {
      const searchId = document.getElementById("searchId").value.trim();
      const resultDiv = document.getElementById("searchResult");
      resultDiv.innerHTML = "";

      if (searchId === "") {
        resultDiv.innerHTML = '<div class="alert alert-danger">Please enter a Booking ID first.</div>';
        return;
      }

      fetch("/searchBooking/" + searchId)
        .then(res => {
          if (!res.ok) {
            return res.json().then(err => {
              throw new Error(err.message || "Booking not found");
            });
          }
          return res.json();
        })
        .then(booking => {
          resultDiv.innerHTML = `
            <div class="receipt-card">
              <div class="receipt-header">
                <h3 style="font-size: 1.15rem; margin-bottom: 0; color: #38bdf8;">Booking Receipt</h3>
                <span style="font-size: 0.75rem; font-weight: bold; background-color: #38bdf8; color: #1e293b; padding: 0.25rem 0.5rem; border-radius: 4px;">ACTIVE</span>
              </div>
              <div class="receipt-body">
                <div class="receipt-row">
                  <div class="receipt-label">Booking ID:</div>
                  <div class="receipt-value">${booking.bookingId}</div>
                </div>
                <div class="receipt-row">
                  <div class="receipt-label">Customer Name:</div>
                  <div class="receipt-value">${booking.customerName}</div>
                </div>
                <div class="receipt-row">
                  <div class="receipt-label">Movie Title:</div>
                  <div class="receipt-value">${booking.movieName}</div>
                </div>
                <div class="receipt-row">
                  <div class="receipt-label">Seat Number:</div>
                  <div class="receipt-value"><span class="table-badge">${booking.seatNo}</span></div>
                </div>
                <div class="receipt-row">
                  <div class="receipt-label">Show Time:</div>
                  <div class="receipt-value">${booking.showTime}</div>
                </div>
                <div class="receipt-row">
                  <div class="receipt-label">Ticket Price:</div>
                  <div class="receipt-value">₹${booking.ticketPrice}</div>
                </div>
              </div>
            </div>
          `;
        })
        .catch(err => {
          resultDiv.innerHTML = `<div class="alert alert-danger">Error: ${err.message}</div>`;
        });
    });
  </script>

</body>
</html>
